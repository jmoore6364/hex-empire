<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hex Empire — a 3D 4X prototype</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0e14; font-family: 'Segoe UI', system-ui, sans-serif; color: #e8eef5; }
    #app { position: fixed; inset: 0; }
    canvas { display: block; }

    /* --- HUD --- */
    .panel { position: absolute; background: rgba(16, 22, 33, 0.85); border: 1px solid rgba(120, 160, 210, 0.3); border-radius: 8px; padding: 10px 14px; backdrop-filter: blur(6px); pointer-events: none; }
    #topbar { top: 12px; left: 12px; display: flex; gap: 20px; align-items: center; font-size: 14px; }
    #topbar .stat { display: flex; flex-direction: column; line-height: 1.2; }
    #topbar .stat b { font-size: 18px; }
    #topbar .label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.6; }
    .food  { color: #7fd17f; } .prod { color: #e0a85a; } .gold { color: #e8d24a; } .sci { color: #6fb7e8; }

    #selection { bottom: 12px; left: 12px; min-width: 250px; max-width: 300px; max-height: 70vh; overflow-y: auto; font-size: 13px; pointer-events: auto; }
    #selection h3 { font-size: 15px; margin-bottom: 6px; color: #cfe0f5; }
    #selection .row { display: flex; justify-content: space-between; gap: 12px; opacity: 0.9; line-height: 1.5; }
    #selection .sec { margin-top: 9px; margin-bottom: 2px; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.5; border-top: 1px solid rgba(120,160,210,0.18); padding-top: 6px; }
    #selection .actions { pointer-events: auto; margin-top: 10px; display: flex; gap: 6px; flex-wrap: wrap; }

    #help { top: 12px; right: 12px; max-width: 260px; font-size: 12px; line-height: 1.6; opacity: 0.9; }
    #help h3 { font-size: 13px; margin-bottom: 4px; }
    #help kbd { background: #26344a; border-radius: 3px; padding: 1px 5px; font-family: inherit; font-size: 11px; }

    #endturn { position: absolute; bottom: 18px; right: 18px; pointer-events: auto;
      background: linear-gradient(180deg, #3a7d44, #2c5e34); color: #fff; border: 1px solid #4d9e5a;
      border-radius: 8px; padding: 14px 26px; font-size: 16px; font-weight: 600; cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,0,0,0.4); transition: transform .08s, filter .08s; }
    #endturn:hover { filter: brightness(1.12); }
    #endturn:active { transform: translateY(1px); }

    button.act { pointer-events: auto; background: #26344a; color: #dce8f7; border: 1px solid #3a5275;
      border-radius: 6px; padding: 7px 12px; font-size: 12px; cursor: pointer; }
    button.act:hover { background: #314463; }
    button.act:disabled { opacity: 0.4; cursor: default; }

    #toast { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      font-size: 22px; font-weight: 700; text-shadow: 0 2px 10px #000; opacity: 0; transition: opacity .4s; pointer-events: none; }
    #loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      font-size: 20px; letter-spacing: 1px; background: #0a0e14; z-index: 10; }
  </style>
</head>
<body>
  <div id="app"></div>

  <div id="loading">Generating world…</div>

  <div id="topbar" class="panel">
    <div class="stat"><span class="label">Turn</span><b id="turn">1</b></div>
    <div class="stat"><span class="label">Civ</span><b id="civname">Your Empire</b></div>
    <div class="stat food"><span class="label">Food</span><b id="food">0</b></div>
    <div class="stat prod"><span class="label">Prod</span><b id="prod">0</b></div>
    <div class="stat gold"><span class="label">Gold</span><b id="gold">0</b></div>
    <div class="stat sci"><span class="label">Science</span><b id="sci">0</b></div>
  </div>

  <div id="help" class="panel">
    <h3>Controls</h3>
    <kbd>WASD</kbd>/<kbd>arrows</kbd>/<kbd>drag</kbd> pan · <kbd>Q</kbd>/<kbd>E</kbd> rotate<br />
    <kbd>scroll</kbd>/<kbd>pinch</kbd> zoom · <kbd>right-drag</kbd> orbit<br />
    <kbd>left-click</kbd> select / move unit<br />
    <kbd>Space</kbd> end turn
  </div>

  <div id="selection" class="panel" style="display:none">
    <h3 id="sel-title">—</h3>
    <div id="sel-body"></div>
    <div class="actions" id="sel-actions"></div>
  </div>

  <button id="endturn">End Turn ▶</button>
  <div id="toast"></div>

  <script type="importmap">
  {
    "imports": {
      "three": "./vendor/three.module.js"
    }
  }
  </script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
